<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>KaiBan ERP v1</title><link rel="stylesheet" href="style.css"></head><body><aside class="sidebar"><div class="brand"><div class="logo">🍃</div><div><strong>KaiBan ERP</strong><span>開拌食材成本系統 v1</span></div></div><button class="nav active" data-view="dashboard">📊 Dashboard</button><button class="nav" data-view="foods">🔍 食材搜尋</button><button class="nav" data-view="purchases">📦 採購紀錄</button><button class="nav" data-view="suppliers">🏪 供應商</button></aside><main><section class="topbar"><div><h1 id="pageTitle">Dashboard</h1><p>目前資料來自你已提供的採購發票、進貨單與修正品名。</p></div><div class="searchBox"><input id="globalSearch" placeholder="搜尋：雞胸、醬、牛、Costco、開元…"></div></section><section id="dashboard" class="view active"><div class="cards"><div class="stat"><span>採購筆數</span><strong id="statRows">0</strong></div><div class="stat"><span>累計金額</span><strong id="statTotal">$0</strong></div><div class="stat"><span>供應商數</span><strong id="statSuppliers">0</strong></div><div class="stat"><span>食材品項</span><strong id="statFoods">0</strong></div></div><div class="panel"><h2>最近採購</h2><div id="recentList" class="list"></div></div></section><section id="foods" class="view"><div class="panel"><h2>食材搜尋</h2><p class="muted">同品項會自動合併成食材卡，顯示最新價、最低價、最高價與平均價。</p><div id="foodCards" class="foodGrid"></div></div></section><section id="purchases" class="view"><div class="panel"><h2>採購紀錄</h2><div class="tableWrap"><table><thead><tr><th>日期</th><th>供應商</th><th>品項</th><th>分類</th><th>規格</th><th>數量</th><th>單價</th><th>小計</th><th>備註</th></tr></thead><tbody id="purchaseRows"></tbody></table></div></div></section><section id="suppliers" class="view"><div class="panel"><h2>供應商</h2><div id="supplierCards" class="foodGrid"></div></div></section></main><script src="data.js"></script><script src="app.js"></script></body></html>
